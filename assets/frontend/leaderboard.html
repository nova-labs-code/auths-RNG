<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>leaderboard - auth's RNG</title>
  <meta name="description" content="global leaderboard for auth's RNG">
  <meta name="robots" content="noindex">
  <style>
    :root {
      --bg: #0e0e0e;
      --text: #dcdcdc;
      --muted: #666;
      --border: #2a2a2a;
      --accent: #88dd88;
      --rare: #f0c070;
      --danger: #ff8888;
      --rank1: #ffd700;
      --rank2: #c0c0c0;
      --rank3: #cd7f32;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: monospace;
      font-size: 17px;
      line-height: 1.7;
      min-height: 100vh;
      padding: 28px;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
    }

    a { color: var(--text); text-decoration: none; border-bottom: 1px dotted #444; }
    a:hover { opacity: 0.7; }

    h1 {
      font-size: 1.4rem;
      font-weight: normal;
      letter-spacing: 0.06em;
      margin: 0 0 0.4em 0;
      text-transform: lowercase;
    }

    .meta {
      font-size: 0.85em;
      color: var(--muted);
      margin-bottom: 1.6em;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .refresh-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent);
      display: inline-block;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .player-count { color: var(--muted); font-size: 0.88em; }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 2em;
    }

    thead th {
      text-align: left;
      padding: 6px 10px 6px 0;
      font-size: 0.8em;
      color: var(--muted);
      border-bottom: 1px dotted #333;
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
      letter-spacing: 0.04em;
    }
    thead th:hover { color: var(--text); }
    thead th.sorted { color: var(--accent); }

    tbody tr { border-bottom: 1px dotted #222; }
    tbody tr:hover { background: #141414; }

    td {
      padding: 8px 10px 8px 0;
      font-size: 0.88em;
      white-space: nowrap;
      vertical-align: middle;
    }

    .rank-cell { color: var(--muted); font-size: 0.8em; width: 32px; }
    .rank-1 { color: var(--rank1); }
    .rank-2 { color: var(--rank2); }
    .rank-3 { color: var(--rank3); }

    .username-cell { max-width: 150px; overflow: hidden; text-overflow: ellipsis; }

    .rarest-cell { color: var(--rare); font-size: 0.82em; }
    .rarest-denom { color: var(--muted); font-size: 0.85em; margin-left: 4px; }

    .time-cell { color: var(--muted); }
    .updated-cell { color: #444; font-size: 0.8em; }

    .state-box {
      color: var(--muted);
      font-size: 0.9em;
      padding: 2em 0;
    }

    .error-box {
      color: var(--danger);
      font-size: 0.85em;
      margin-bottom: 1em;
      border-left: 2px solid #402020;
      padding-left: 12px;
    }

    .back-link {
      display: inline-block;
      margin-top: 2em;
      padding: 8px 16px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-bottom: 1px solid #2a2a2a;
      border-radius: 2px;
      font-size: 0.9em;
    }
    .back-link:hover { background: #222; opacity: 1; }

    p.small {
      font-size: 0.85em;
      opacity: 0.65;
      margin-bottom: 0.5em;
    }

    @media (max-width: 500px) {
      body { padding: 16px; }
      td, thead th { padding: 6px 8px 6px 0; font-size: 0.8em; }
    }
  </style>
</head>
<body>
<div class="container">

  <h1>leaderboard</h1>

  <div class="meta">
    <span><span class="refresh-dot" id="refreshDot"></span> <span id="refreshStatus">loading...</span></span>
    <span id="nextRefreshLabel"></span>
    <span id="playerCount" class="player-count"></span>
  </div>

  <div id="errorBox" class="error-box" style="display:none;"></div>

  <div id="stateBox" class="state-box">fetching leaderboard...</div>

  <table id="lbTable" style="display:none;">
    <thead>
      <tr>
        <th class="rank-cell">#</th>
        <th data-col="username">player</th>
        <th data-col="rolls" class="sorted">rolls <span class="sort-arrow">↓</span></th>
        <th data-col="rarities">collected</th>
        <th data-col="rarestDenom">rarest</th>
        <th data-col="playtime">time</th>
        <th data-col="points">points</th>
        <th data-col="updatedAt">updated</th>
      </tr>
    </thead>
    <tbody id="lbBody"></tbody>
  </table>

  <p class="small">leaderboard updates every 15 minutes &nbsp;·&nbsp; opt-in from the settings page</p>
  <a href="index.html" class="back-link">← back to game</a>

</div>

<script>
'use strict';

const API = 'https://leaderboard.authsrng.xyz/api/leaderboard';
const REFRESH_INTERVAL = 15 * 60 * 1000;

let allEntries = [];
let sortCol = 'rolls';
let sortDir = -1;
let refreshTimer = null;
let countdownTimer = null;
let nextRefreshAt = 0;

function abbr(n) {
  n = Number(n) || 0;
  if (n >= 1e12) return (n / 1e12).toFixed(1).replace(/\.0$/, '') + 'T';
  if (n >= 1e9)  return (n / 1e9).toFixed(1).replace(/\.0$/, '') + 'B';
  if (n >= 1e6)  return (n / 1e6).toFixed(1).replace(/\.0$/, '') + 'M';
  if (n >= 1e3)  return (n / 1e3).toFixed(1).replace(/\.0$/, '') + 'K';
  return String(Math.floor(n));
}

function fmtTime(s) {
  s = Math.floor(Number(s) || 0);
  if (s >= 86400) return Math.floor(s / 86400) + 'd ' + Math.floor((s % 86400) / 3600) + 'h';
  if (s >= 3600)  return Math.floor(s / 3600) + 'h ' + Math.floor((s % 3600) / 60) + 'm';
  if (s >= 60)    return Math.floor(s / 60) + 'm';
  return s + 's';
}

function fmtAgo(ts) {
  const s = Math.floor((Date.now() - ts) / 1000);
  if (s < 60)    return s + 's ago';
  if (s < 3600)  return Math.floor(s / 60) + 'm ago';
  if (s < 86400) return Math.floor(s / 3600) + 'h ago';
  return Math.floor(s / 86400) + 'd ago';
}

function fmtCountdown(ms) {
  const s = Math.ceil(ms / 1000);
  if (s <= 0) return 'refreshing...';
  const m = Math.floor(s / 60), r = s % 60;
  return 'next refresh in ' + (m > 0 ? m + 'm ' : '') + r + 's';
}

function rankLabel(i) {
  if (i === 0) return '#1';
  if (i === 1) return '#2';
  if (i === 2) return '#3';
  return String(i + 1);
}

function escHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function renderTable() {
  const sorted = [...allEntries].sort((a, b) => {
    let av = a[sortCol], bv = b[sortCol];
    if (sortCol === 'username') {
      av = (av || '').toLowerCase(); bv = (bv || '').toLowerCase();
      return sortDir * av.localeCompare(bv);
    }
    return sortDir * ((Number(av) || 0) - (Number(bv) || 0));
  });

  const tbody = document.getElementById('lbBody');
  if (!sorted.length) {
    tbody.innerHTML = '<tr><td colspan="8" style="color:#555;padding:24px 0;">no entries yet — be the first!</td></tr>';
    return;
  }

  tbody.innerHTML = sorted.map((e, i) => {
    const rankClass = i < 3 ? ' rank-' + (i + 1) : '';
    const rarest = e.rarestDenom > 0
      ? `${escHtml(e.rarestName || '?')}<span class="rarest-denom">1/${abbr(e.rarestDenom)}</span>`
      : `<span style="color:#444;">none</span>`;

    return `<tr>
      <td class="rank-cell${rankClass}">${rankLabel(i)}</td>
      <td class="username-cell">${escHtml(e.username || '?')}</td>
      <td>${abbr(e.rolls)}</td>
      <td>${abbr(e.rarities)}</td>
      <td class="rarest-cell">${rarest}</td>
      <td class="time-cell">${fmtTime(e.playtime)}</td>
      <td>${abbr(e.points)}</td>
      <td class="updated-cell">${fmtAgo(e.updatedAt)}</td>
    </tr>`;
  }).join('');
}

async function fetchLeaderboard() {
  const dot = document.getElementById('refreshDot');
  const status = document.getElementById('refreshStatus');
  const errorBox = document.getElementById('errorBox');
  const stateBox = document.getElementById('stateBox');
  const table = document.getElementById('lbTable');

  dot.style.background = '#888';
  status.textContent = 'refreshing...';
  errorBox.style.display = 'none';

  try {
    const r = await fetch(API + '?t=' + Date.now());
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const data = await r.json();

    allEntries = data.entries || [];
    document.getElementById('playerCount').textContent =
      allEntries.length + ' player' + (allEntries.length !== 1 ? 's' : '') + ' on the board';

    stateBox.style.display = 'none';
    table.style.display = '';
    renderTable();

    const cachedAt = data.cachedAt ? new Date(data.cachedAt).toLocaleTimeString() : 'unknown';
    status.textContent = 'live · data from ' + cachedAt;
    dot.style.background = 'var(--accent)';

    const cacheAge = data.cachedAt ? Date.now() - data.cachedAt : 0;
    const waitMs = Math.max(30_000, REFRESH_INTERVAL - cacheAge);
    scheduleNext(waitMs);
  } catch (e) {
    dot.style.background = 'var(--danger)';
    status.textContent = 'error';
    errorBox.textContent = 'failed to load leaderboard: ' + e.message;
    errorBox.style.display = 'block';
    if (!allEntries.length) stateBox.textContent = "couldn't load leaderboard. " + e.message;
    scheduleNext(60_000);
  }
}

function scheduleNext(ms) {
  clearTimeout(refreshTimer);
  clearInterval(countdownTimer);
  nextRefreshAt = Date.now() + ms;
  refreshTimer = setTimeout(fetchLeaderboard, ms);

  const label = document.getElementById('nextRefreshLabel');
  countdownTimer = setInterval(() => {
    const remaining = nextRefreshAt - Date.now();
    if (remaining <= 0) { clearInterval(countdownTimer); return; }
    label.textContent = fmtCountdown(remaining);
  }, 1000);
}

document.querySelectorAll('thead th[data-col]').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.col;
    if (sortCol === col) { sortDir *= -1; }
    else { sortCol = col; sortDir = col === 'username' ? 1 : -1; }

    document.querySelectorAll('thead th').forEach(h => {
      h.classList.remove('sorted');
      const arrow = h.querySelector('.sort-arrow');
      if (arrow) arrow.remove();
    });

    th.classList.add('sorted');
    const arrow = document.createElement('span');
    arrow.className = 'sort-arrow';
    arrow.textContent = sortDir === -1 ? ' ↓' : ' ↑';
    th.appendChild(arrow);
    renderTable();
  });
});

fetchLeaderboard();
</script>
</body>
</html>
