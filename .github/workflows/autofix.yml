name: autofix

on:
  push:
    branches: [nightly]

  workflow_dispatch:

concurrency:
  group: autofix-${{ github.ref }}
  cancel-in-progress: true

jobs:
  autofix:
    name: format & lint fix
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: install tools
        run: |
          npm install --no-save \
            prettier \
            eslint @eslint/js globals \
            stylelint stylelint-config-standard

      - name: prettier --write
        run: |
          npx prettier --write \
            "**/*.js" \
            "**/*.css" \
            "**/*.html" \
            --ignore-path .gitignore

      - name: eslint --fix
        run: npx eslint --fix
        continue-on-error: true

      - name: stylelint --fix
        run: |
          npx stylelint \
            "assets/scripts/styles/*.css" \
            --fix
        continue-on-error: true

      - name: commit fixes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "nothing to fix, codebase is already clean!"
          else
            git commit -m "chore: autofix formatting and lint [skip ci]"
            git push
          fi
