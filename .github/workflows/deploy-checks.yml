name: Quality Checks

on:
  push:
    branches: [nightly]
  pull_request:
    branches: [nightly]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  lint:
    name: Lint (JS / CSS / HTML)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Da Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install lint tools
        run: npm install --no-save eslint @eslint/js globals stylelint stylelint-config-standard htmlhint

      - name: ESLint
        run: npx eslint --max-warnings 0

      - name: Stylelint
        run: npx stylelint "styles.css" --config '{"extends":["stylelint-config-standard"]}'

      - name: HTMLHint
        run: |
          npx htmlhint \
            "index.html" \
            "404.html" \
            "assets/frontend/*.html" \
            "blog/*.html" \
            "blog/posts/*.html" \
            "boring/*.html" \
            --config '{"doctype-first":true,"title-require":true,"attr-lowercase":true,"attr-value-double-quotes":true,"tag-pair":true,"id-unique":true,"src-not-empty":true,"alt-require":true}'

  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install test tools
        run: npm install --no-save @playwright/test serve wait-on

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Serve game
        run: npx serve . -p 8080 &

      - name: Wait for server
        run: npx wait-on http://localhost:8080 --timeout 15000

      - name: Run smoke tests
        run: npx playwright test tests/smoke.spec.js --project=chromium
        env:
          BASE_URL: http://localhost:8080

  lighthouse:
    name: Lighthouse
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install tools
        run: npm install --no-save @lhci/cli serve wait-on

      - name: Serve game
        run: npx serve . -p 8080 &

      - name: Wait for server
        run: npx wait-on http://localhost:8080 --timeout 15000

      - name: stupid Lighthouse CI
        run: npx lhci autorun

  all-checks-passed:
    name: All checks passed
    runs-on: ubuntu-latest
    needs: [lint, smoke-test, lighthouse]
    if: always()
    steps:
      - name: Gate
        run: |
          if [[ "${{ needs.lint.result }}" != "success" || \
                "${{ needs.smoke-test.result }}" != "success" || \
                "${{ needs.lighthouse.result }}" != "success" ]]; then
            echo "one or more checks failed"
            exit 1
          fi
