name: cool quality checks

on:
  push:
    branches: [nightly]
  pull_request:
    branches: [nightly]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: setup da node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: install lint tools
        run: npm install --no-save eslint @eslint/js globals stylelint stylelint-config-standard htmlhint

      - name: ESLint
        run: npx eslint --max-warnings 0

      - name: stylelint
        run: npx stylelint "styles.css"

      - name: HTMLHint
        run: |
          npx htmlhint \
            "index.html" \
            "404.html" \
            "assets/frontend/*.html" \
            "blog/*.html" \
            "blog/posts/*.html" \
            "boring/*.html" \
            --config '{"doctype-first":true,"title-require":true,"attr-lowercase":true,"attr-value-double-quotes":true,"tag-pair":true,"id-unique":true,"src-not-empty":true,"alt-require":true}'

  smoke-test:
    name: smoke test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: install test tools
        run: npm install --no-save @playwright/test serve wait-on

      - name: install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: serve game
        run: npx serve . -p 8080 &

      - name: wait for server
        run: npx wait-on http://localhost:8080 --timeout 15000

      - name: run smoke tests
        run: npx playwright test tests/smoke.spec.js --project=chromium
        env:
          BASE_URL: http://localhost:8080

  lighthouse:
    name: lighthouse
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: install tools
        run: npm install --no-save @lhci/cli serve wait-on

      - name: serve game
        run: npx serve . -p 8080 &

      - name: wait for server
        run: npx wait-on http://localhost:8080 --timeout 15000

      - name: lighthouse CI
        run: npx lhci autorun

  all-checks-passed:
    name: all checks passed!
    runs-on: ubuntu-latest
    needs: [lint, smoke-test, lighthouse]
    if: always()
    steps:
      - name: gate
        run: |
          if [[ "${{ needs.lint.result }}" != "success" || \
                "${{ needs.smoke-test.result }}" != "success" || \
                "${{ needs.lighthouse.result }}" != "success" ]]; then
            echo "one or more checks failed"
            exit 1
          fi
