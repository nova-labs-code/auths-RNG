<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>leaderboard - auth's RNG</title>
  <meta name="description" content="global leaderboard for auth's RNG">
  <meta name="robots" content="noindex">
  <style>
    :root {
      --bg: #0e0e0e;
      --surface: #141414;
      --surface2: #1a1a1a;
      --border: #2a2a2a;
      --text: #e0e0e0;
      --muted: #666;
      --accent: #88dd88;
      --rare: #f0c070;
      --danger: #ff8888;
      --rank1: #ffd700;
      --rank2: #c0c0c0;
      --rank3: #cd7f32;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Courier New', Courier, monospace;
      font-size: 14px;
      min-height: 100vh;
      padding: 0;
    }

    a { color: var(--text); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ── header ── */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .back-link {
      opacity: 0.5;
      font-size: 0.85em;
      transition: opacity 0.15s;
    }
    .back-link:hover { opacity: 1; text-decoration: none; }

    .header h1 {
      font-size: 1.1em;
      font-weight: normal;
      letter-spacing: 0.05em;
    }

    .header-meta {
      display: flex;
      align-items: center;
      gap: 14px;
      font-size: 0.78em;
      color: var(--muted);
      flex-wrap: wrap;
    }

    .refresh-bar {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .refresh-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* ── controls ── */
    .controls {
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      background: var(--surface);
    }

    .player-count {
      font-size: 0.8em;
      color: var(--muted);
    }

    .sort-label {
      font-size: 0.78em;
      color: var(--muted);
      margin-left: auto;
    }

    /* ── table ── */
    .table-wrap {
      overflow-x: auto;
      padding: 0 20px 40px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 12px;
      min-width: 600px;
    }

    thead th {
      text-align: left;
      padding: 10px 12px;
      font-size: 0.78em;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
      transition: color 0.15s;
      letter-spacing: 0.04em;
    }

    thead th:hover { color: var(--text); }
    thead th.sorted { color: var(--accent); }
    thead th .sort-arrow { margin-left: 4px; opacity: 0.6; }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.1s;
    }

    tbody tr:hover { background: var(--surface2); }

    td {
      padding: 10px 12px;
      font-size: 0.88em;
      white-space: nowrap;
    }

    .rank-cell {
      width: 46px;
      color: var(--muted);
      font-size: 0.8em;
    }

    .rank-1 { color: var(--rank1); font-weight: bold; }
    .rank-2 { color: var(--rank2); }
    .rank-3 { color: var(--rank3); }

    .username-cell {
      font-weight: normal;
      max-width: 160px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .rarest-cell {
      color: var(--rare);
      font-size: 0.82em;
    }

    .rarest-denom {
      display: block;
      color: var(--muted);
      font-size: 0.85em;
    }

    .time-cell { color: var(--muted); }

    /* ── states ── */
    .state-box {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
      font-size: 0.9em;
    }

    .state-box .icon { font-size: 2em; margin-bottom: 12px; display: block; }

    /* ── error ── */
    .error-box {
      background: var(--surface);
      border: 1px solid #402020;
      color: var(--danger);
      padding: 12px 16px;
      margin: 20px;
      font-size: 0.85em;
      border-radius: 2px;
    }

    /* ── footer ── */
    .footer {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      font-size: 0.75em;
      color: var(--muted);
      text-align: center;
    }

    /* ── mobile ── */
    @media (max-width: 500px) {
      .header { padding: 12px 14px; }
      .controls { padding: 10px 14px; }
      .table-wrap { padding: 0 0 40px; }
      td, thead th { padding: 8px 10px; }
    }
  </style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <a href="index.html" class="back-link">← back</a>
    <h1>leaderboard</h1>
  </div>
  <div class="header-meta">
    <div class="refresh-bar">
      <div class="refresh-dot" id="refreshDot"></div>
      <span id="refreshStatus">loading...</span>
    </div>
    <span id="nextRefreshLabel"></span>
  </div>
</div>

<div class="controls">
  <span class="player-count" id="playerCount"></span>
  <span class="sort-label">click column headers to sort</span>
</div>

<div id="errorBox" class="error-box" style="display:none;"></div>

<div class="table-wrap">
  <div id="stateBox" class="state-box">
    <span class="icon">⏳</span>
    fetching leaderboard...
  </div>

  <table id="lbTable" style="display:none;">
    <thead>
      <tr>
        <th class="rank-cell">#</th>
        <th data-col="username">player</th>
        <th data-col="rolls" class="sorted">rolls <span class="sort-arrow">↓</span></th>
        <th data-col="rarities">collected</th>
        <th data-col="rarestDenom">rarest</th>
        <th data-col="playtime">time</th>
        <th data-col="points">points</th>
        <th data-col="updatedAt">updated</th>
      </tr>
    </thead>
    <tbody id="lbBody"></tbody>
  </table>
</div>

<div class="footer">
  leaderboard updates every 15 minutes &nbsp;·&nbsp; opt-in from the settings page &nbsp;·&nbsp;
  <a href="index.html">play auth's RNG!!!!!</a>
</div>

<script>
'use strict';

const API = 'https://backup.authsrng.xyz/api/leaderboard';
const REFRESH_INTERVAL = 15 * 60 * 1000;

let allEntries = [];
let sortCol = 'rolls';
let sortDir = -1; // -1 = desc, 1 = asc
let refreshTimer = null;
let countdownTimer = null;
let nextRefreshAt = 0;

// ── formatting ──────────────────────────────────────────────

function abbr(n) {
  n = Number(n) || 0;
  if (n >= 1e12) return (n / 1e12).toFixed(1).replace(/\.0$/, '') + 'T';
  if (n >= 1e9)  return (n / 1e9).toFixed(1).replace(/\.0$/, '') + 'B';
  if (n >= 1e6)  return (n / 1e6).toFixed(1).replace(/\.0$/, '') + 'M';
  if (n >= 1e3)  return (n / 1e3).toFixed(1).replace(/\.0$/, '') + 'K';
  return String(Math.floor(n));
}

function fmtTime(s) {
  s = Math.floor(Number(s) || 0);
  if (s >= 86400) return Math.floor(s / 86400) + 'd ' + Math.floor((s % 86400) / 3600) + 'h';
  if (s >= 3600)  return Math.floor(s / 3600) + 'h ' + Math.floor((s % 3600) / 60) + 'm';
  if (s >= 60)    return Math.floor(s / 60) + 'm';
  return s + 's';
}

function fmtAgo(ts) {
  const s = Math.floor((Date.now() - ts) / 1000);
  if (s < 60)    return s + 's ago';
  if (s < 3600)  return Math.floor(s / 60) + 'm ago';
  if (s < 86400) return Math.floor(s / 3600) + 'h ago';
  return Math.floor(s / 86400) + 'd ago';
}

function fmtCountdown(ms) {
  const s = Math.ceil(ms / 1000);
  if (s <= 0) return 'refreshing...';
  const m = Math.floor(s / 60), r = s % 60;
  return 'next refresh in ' + (m > 0 ? m + 'm ' : '') + r + 's';
}

function rankLabel(i) {
  if (i === 0) return '🥇';
  if (i === 1) return '🥈';
  if (i === 2) return '🥉';
  return String(i + 1);
}

// ── renderrrrrrrrrrrrrrrrrrrrrrrrrrrr ───────────────────────────────────────────────────

function renderTable() {
  const sorted = [...allEntries].sort((a, b) => {
    let av = a[sortCol], bv = b[sortCol];
    if (sortCol === 'username') {
      av = (av || '').toLowerCase();
      bv = (bv || '').toLowerCase();
      return sortDir * av.localeCompare(bv);
    }
    return sortDir * ((Number(bv) || 0) - (Number(av) || 0));
  });

  const tbody = document.getElementById('lbBody');
  if (!sorted.length) {
    tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:40px;color:#555;">no entries yet — be the first!</td></tr>';
    return;
  }

  tbody.innerHTML = sorted.map((e, i) => {
    const rankClass = i < 3 ? ' rank-' + (i + 1) : '';
    const rarest = e.rarestDenom > 0
      ? `<span>${escHtml(e.rarestName || '?')}</span><span class="rarest-denom">1/${abbr(e.rarestDenom)}</span>`
      : `<span style="color:#444;">none</span>`;

    return `<tr>
      <td class="rank-cell${rankClass}">${rankLabel(i)}</td>
      <td class="username-cell">${escHtml(e.username || '?')}</td>
      <td>${abbr(e.rolls)}</td>
      <td>${abbr(e.rarities)}</td>
      <td class="rarest-cell">${rarest}</td>
      <td class="time-cell">${fmtTime(e.playtime)}</td>
      <td>${abbr(e.points)}</td>
      <td style="color:#444;font-size:0.8em;">${fmtAgo(e.updatedAt)}</td>
    </tr>`;
  }).join('');
}

function escHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ── fetch ────────────────────────────────────────────────────

async function fetchLeaderboard() {
  const dot = document.getElementById('refreshDot');
  const status = document.getElementById('refreshStatus');
  const errorBox = document.getElementById('errorBox');
  const stateBox = document.getElementById('stateBox');
  const table = document.getElementById('lbTable');

  dot.style.background = '#888';
  status.textContent = 'refreshing...';
  errorBox.style.display = 'none';

  try {
    const r = await fetch(API + '?t=' + Date.now());
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const data = await r.json();

    allEntries = data.entries || [];

    document.getElementById('playerCount').textContent =
      allEntries.length + ' player' + (allEntries.length !== 1 ? 's' : '') + ' on the board';

    stateBox.style.display = 'none';
    table.style.display = '';
    renderTable();

    const cachedAt = data.cachedAt ? new Date(data.cachedAt).toLocaleTimeString() : 'unknown';
    status.textContent = 'live · data from ' + cachedAt;
    dot.style.background = 'var(--accent)';

    // schedule next fetch aligned to cache TTL
    const cacheAge = data.cachedAt ? Date.now() - data.cachedAt : 0;
    const waitMs = Math.max(30_000, REFRESH_INTERVAL - cacheAge);
    scheduleNext(waitMs);

  } catch (e) {
    dot.style.background = 'var(--danger)';
    status.textContent = 'error';
    errorBox.textContent = 'failed to load leaderboard: ' + e.message;
    errorBox.style.display = 'block';
    if (!allEntries.length) {
      stateBox.innerHTML = '<span class="icon">😿</span>couldn\'t load leaderboard.<br><small style="opacity:0.5;">' + e.message + '</small>';
    }
    scheduleNext(60_000); // retry in 1m on error
  }
}

function scheduleNext(ms) {
  clearTimeout(refreshTimer);
  clearInterval(countdownTimer);
  nextRefreshAt = Date.now() + ms;
  refreshTimer = setTimeout(fetchLeaderboard, ms);

  const label = document.getElementById('nextRefreshLabel');
  countdownTimer = setInterval(() => {
    const remaining = nextRefreshAt - Date.now();
    if (remaining <= 0) { clearInterval(countdownTimer); return; }
    label.textContent = fmtCountdown(remaining);
  }, 1000);
}

// ── sort headers ─────────────────────────────────────────────

document.querySelectorAll('thead th[data-col]').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.col;
    if (sortCol === col) {
      sortDir *= -1;
    } else {
      sortCol = col;
      sortDir = col === 'username' ? 1 : -1;
    }

    document.querySelectorAll('thead th').forEach(h => {
      h.classList.remove('sorted');
      const arrow = h.querySelector('.sort-arrow');
      if (arrow) arrow.remove();
    });

    th.classList.add('sorted');
    const arrow = document.createElement('span');
    arrow.className = 'sort-arrow';
    arrow.textContent = sortDir === -1 ? ' ↓' : ' ↑';
    th.appendChild(arrow);

    renderTable();
  });
});

fetchLeaderboard();
</script>

</body>
</html>
